<div class="mb-3">
  <label class="form-label" *ngIf="label">
    {{ label }}
    <span *ngIf="required" class="text-danger">*</span>
  </label>
  <select
    class="form-select"
    [ngModel]="selectedId"
    (ngModelChange)="onChange($event)"
  >
    <option [ngValue]="null">{{ placeholder }}</option>
    <option *ngFor="let opt of options" [ngValue]="opt.id">{{ opt.nombre }}</option>
  </select>
</div>
