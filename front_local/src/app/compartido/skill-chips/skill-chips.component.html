<div class="skill-chips d-flex flex-wrap gap-1">
  <span *ngFor="let h of visible" class="badge bg-secondary d-inline-flex align-items-center gap-1">
    <app-base64-image
      *ngIf="h.img"
      [src]="h.img"
      [alt]="h.nombre"
      maxHeight="16px"
      cssClass="skill-chip-icon"
    ></app-base64-image>
    {{ h.nombre }}
  </span>
  <span *ngIf="hiddenCount > 0" class="badge bg-light text-dark">+{{ hiddenCount }}</span>
</div>
