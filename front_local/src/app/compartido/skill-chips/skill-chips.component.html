<div class="skill-chips d-flex flex-wrap">
  <span *ngFor="let h of visible" class="badge-pf badge-pf--skill">
    <app-base64-image
      *ngIf="h.img"
      [src]="h.img"
      [alt]="h.nombre"
      maxHeight="14px"
      cssClass="badge-pf__icon"
    ></app-base64-image>
    {{ h.nombre }}
  </span>
  <span *ngIf="hiddenCount > 0" class="badge-pf badge-pf--more">+{{ hiddenCount }}</span>
</div>
