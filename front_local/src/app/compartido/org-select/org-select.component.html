<div class="mb-3">
  <label class="form-label">
    Organización
    <span *ngIf="required" class="text-danger">*</span>
  </label>
  <div class="d-flex gap-2">
    <select
      class="form-select"
      [ngModel]="selectedId"
      (ngModelChange)="onChange($event)"
    >
      <option [ngValue]="null">Seleccionar organización...</option>
      <option *ngFor="let org of organizaciones" [ngValue]="org.id">{{ org.nombre }}</option>
    </select>
    <button
      *ngIf="allowCreate"
      type="button"
      class="btn btn-outline-primary btn-sm text-nowrap"
      (click)="onCreate()"
    >
      Nueva
    </button>
  </div>
</div>
