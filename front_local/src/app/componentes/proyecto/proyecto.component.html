<section class="section section--default">
  <div class="section__header">
    <h2 class="section__title">Proyectos</h2>
    <button
      type="button"
      class="btn-pf btn-pf--add"
      routerLink="/nuevoproyecto"
      *ngIf="isLogged"
      data-tip="Agregar proyecto"
      data-tip-align="end"
      aria-label="Agregar proyecto"
    >
      <i class="bi bi-plus-lg"></i>
    </button>
  </div>

  <div class="section__grid" *ngIf="proyecto.length > 0">
    <article class="card-portfolio card-portfolio--wide" *ngFor="let p of proyecto">
      <div class="proy-image" *ngIf="p.imagen">
        <img
          *ngIf="isUrl(p.imagen)"
          [src]="p.imagen"
          [alt]="p.nombreE"
          class="proy-img"
        />
        <app-base64-image
          *ngIf="!isUrl(p.imagen)"
          [src]="p.imagen"
          [alt]="p.nombreE"
          cssClass="proy-img"
          maxHeight="220px"
        ></app-base64-image>
      </div>

      <div class="card-portfolio__body">
        <div class="mb-2" *ngIf="p.organizacion">
          <app-org-badge [organizacion]="p.organizacion" size="sm"></app-org-badge>
        </div>

        <h3 class="card-portfolio__title">{{ p.nombreE }}</h3>

        <app-periodo-display
          [fechaInicio]="p.fechaInicio"
          [fechaFin]="p.fechaFin"
          [esActual]="p.esActual"
        ></app-periodo-display>

        <p class="card-portfolio__text mt-2">{{ p.descripcionE }}</p>

        <app-skill-chips
          *ngIf="p.habilidades?.length"
          [habilidades]="p.habilidades"
          [maxVisible]="4"
        ></app-skill-chips>

        <div class="admin-actions">
          <button
            class="btn-pf btn-pf--view btn-pf--icon-sm"
            type="button"
            (click)="goProject(p.link)"
            [attr.data-tip]="p.link || 'Ver proyecto'"
            data-tip-wide
            aria-label="Ver proyecto"
          >
            <i class="bi bi-box-arrow-up-right"></i>
          </button>
          <button
            *ngIf="isLogged"
            class="btn-pf btn-pf--edit btn-pf--icon-sm"
            routerLink="/editproyect/{{ p.id }}"
            data-tip="Editar"
            aria-label="Editar"
          >
            <i class="bi bi-pencil-square"></i>
          </button>
          <button
            *ngIf="isLogged"
            class="btn-pf btn-pf--delete btn-pf--icon-sm"
            (click)="delete(p.id)"
            data-tip="Eliminar"
            aria-label="Eliminar"
          >
            <i class="bi bi-trash"></i>
          </button>
        </div>
      </div>
    </article>
  </div>

  <div *ngIf="proyecto.length === 0" class="empty-state">
    No hay proyectos cargados.
  </div>
</section>
