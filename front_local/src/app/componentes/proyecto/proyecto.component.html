<div class="row">
    <h1 class="display-4">Proyectos</h1>

    <div class="col-lg-2">
        <button type="button" class="btn btn-dark" routerLink="/nuevoproyecto" *ngIf="isLogged">
            <i class="bi bi-plus-circle-fill mas"></i>
        </button>
    </div>
</div>

<div class="row proy-list">
    <div
        class="card text-start col-sm-12 col-md-6 col-lg-4 carta color"
        *ngFor="let p of proyecto"
    >
        <div class="proy-image" *ngIf="p.imagen">
            <img
                *ngIf="isUrl(p.imagen)"
                [src]="p.imagen"
                [alt]="p.nombreE"
                class="card-img-top proy-img"
            />
            <app-base64-image
                *ngIf="!isUrl(p.imagen)"
                [src]="p.imagen"
                [alt]="p.nombreE"
                cssClass="card-img-top proy-img"
                maxHeight="220px"
            ></app-base64-image>
        </div>

        <div class="card-body color">
            <div class="mb-2" *ngIf="p.organizacion">
                <app-org-badge [organizacion]="p.organizacion" size="sm"></app-org-badge>
            </div>

            <h2 class="card-title h4">{{ p.nombreE }}</h2>

            <app-periodo-display
                [fechaInicio]="p.fechaInicio"
                [fechaFin]="p.fechaFin"
                [esActual]="p.esActual"
            ></app-periodo-display>

            <p class="card-text mt-2">{{ p.descripcionE }}</p>

            <app-skill-chips
                *ngIf="p.habilidades?.length"
                [habilidades]="p.habilidades"
                [maxVisible]="4"
            ></app-skill-chips>

            <div class="mt-3">
                <button class="btn btn-success boton" type="button" (click)="goProject(p.link)" [title]="p.link">
                    <i class="bi bi-eyeglasses"></i>
                </button>

                <button *ngIf="isLogged" class="btn btn-secondary boton" routerLink="/editproyect/{{ p.id }}">
                    <i class="bi bi-pen-fill"></i>
                </button>

                <button *ngIf="isLogged" class="btn btn-danger boton" (click)="delete(p.id)">
                    <i class="bi bi-trash3-fill"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<div *ngIf="proyecto.length === 0" class="text-muted py-3 px-3">
    No hay proyectos cargados.
</div>
