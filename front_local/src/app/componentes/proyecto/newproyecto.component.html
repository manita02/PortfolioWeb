<section class="min-vh-100 gradient-custom">
    <div class="container py-5">
        <div class="row d-flex justify-content-center">
            <div class="col-12 col-md-10 col-lg-8 col-xl-7">
                <div class="card bg-dark text-white" style="border-radius: 1rem;">
                    <div class="card-body p-4 p-md-5">

                        <h2 class="fw-bold mb-4 text-uppercase text-center">AGREGAR PROYECTO</h2>
                        <form (ngSubmit)="onCreate()" novalidate #f="ngForm" class="text-start">

                            <div class="mb-3">
                                <label for="nombreE" class="form-label">Nombre</label>
                                <input type="text" class="form-control form-control-lg" id="nombreE"
                                    name="nombreE" [(ngModel)]="proyecto.nombreE" required>
                            </div>

                            <div class="mb-3">
                                <label for="descripcionE" class="form-label">Descripción</label>
                                <textarea class="form-control form-control-lg" id="descripcionE" name="descripcionE"
                                    rows="3" [(ngModel)]="proyecto.descripcionE" required></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="link" class="form-label">URL del proyecto</label>
                                <input type="url" class="form-control form-control-lg" id="link"
                                    name="link" [(ngModel)]="proyecto.link" required>
                            </div>

                            <app-periodo-input
                                [fechaInicio]="proyecto.fechaInicio"
                                [fechaFin]="proyecto.fechaFin"
                                [esActual]="proyecto.esActual"
                                [required]="true"
                                (fechaInicioChange)="proyecto.fechaInicio = $event"
                                (fechaFinChange)="proyecto.fechaFin = $event"
                                (esActualChange)="proyecto.esActual = $event"
                            ></app-periodo-input>
                            <small class="text-white-50 d-block mb-3">Formato de fechas: MM/yyyy (ej. 03/2022)</small>

                            <app-org-select
                                [organizaciones]="organizaciones"
                                [(selectedId)]="proyecto.organizacionId"
                                [required]="false"
                                [allowCreate]="true"
                                (createRequested)="onCreateOrg()"
                            ></app-org-select>

                            <label class="form-label">Habilidades relacionadas</label>
                            <app-skill-multi-select
                                [options]="habilidades"
                                [(selectedIds)]="proyecto.habilidadesIds"
                            ></app-skill-multi-select>

                            <div class="mt-3">
                                <app-image-upload
                                    [(value)]="proyecto.imagen"
                                    label="Imagen del proyecto"
                                    [required]="true"
                                ></app-image-upload>
                                <small class="text-white-50">JPEG o PNG, máximo 2 MB. Obligatoria al crear.</small>
                            </div>

                            <div class="text-center mt-4">
                                <button type="submit" class="btn btn-outline-light btn-lg px-5"
                                    [disabled]="!formValido || guardando">
                                    Agregar Proyecto
                                </button>
                                <button type="button" class="btn btn-outline-primary btn-lg px-5 d-block mx-auto mt-3"
                                    routerLink="/">
                                    Volver
                                </button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
