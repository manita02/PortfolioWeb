<div class="row">
    <h1 class="display-4">Hard & Soft Skills</h1>
    <div class="col-lg-2">
        <button type="button" class="btn btn-dark" routerLink="/nuevahabilidad" *ngIf="isLogged">
            <i class="bi bi-plus-circle-fill mas"></i>
        </button>
    </div>
</div>

<div *ngFor="let grupo of grupos" class="mb-4">
    <h5 class="skill-group-title">{{ grupo.tipo }}</h5>
    <div class="row">
        <div class="text-center col-sm-4 col-md-4 col-lg-4 skill-card" *ngFor="let h of grupo.habilidades">
            <div class="skill-icon-wrap" [title]="h.nombre">
                <img
                    *ngIf="isUrl(h.img)"
                    [src]="h.img"
                    [alt]="h.nombre"
                    class="skill-icon"
                />
                <app-base64-image
                    *ngIf="!isUrl(h.img)"
                    [src]="h.img"
                    [alt]="h.nombre"
                    cssClass="skill-icon"
                    maxHeight="80px"
                ></app-base64-image>
            </div>
            <span class="badge bg-primary skill-name-badge">{{ h.nombre }}</span>

            <div class="botones" *ngIf="isLogged">
                <button class="btn btn-secondary" routerLink="/edithabilidad/{{ h.id }}">
                    <i class="bi bi-pen-fill"></i>
                </button>
                <button class="btn btn-danger" (click)="delete(h.id)">
                    <i class="bi bi-trash3-fill"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<div *ngIf="grupos.length === 0" class="text-muted py-3">
    No hay habilidades cargadas.
</div>
