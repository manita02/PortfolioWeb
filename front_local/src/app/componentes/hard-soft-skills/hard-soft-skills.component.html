<section class="section section--alt">
  <div class="section__header">
    <h2 class="section__title">Hard &amp; Soft Skills</h2>
    <button
      type="button"
      class="btn-pf btn-pf--add"
      routerLink="/nuevahabilidad"
      *ngIf="isLogged"
      data-tip="Agregar habilidad"
      data-tip-align="end"
      aria-label="Agregar habilidad"
    >
      <i class="bi bi-plus-lg"></i>
    </button>
  </div>

  <div class="section__inner" *ngFor="let grupo of grupos">
    <h3 class="skills-group-title">{{ grupo.tipo }}</h3>
    <div class="skills-grid">
      <div class="skill-item" *ngFor="let h of grupo.habilidades">
        <div class="skill-item__icon-wrap" [title]="h.nombre">
          <img
            *ngIf="isUrl(h.img)"
            [src]="h.img"
            [alt]="h.nombre"
            class="skill-item__icon"
          />
          <app-base64-image
            *ngIf="!isUrl(h.img)"
            [src]="h.img"
            [alt]="h.nombre"
            cssClass="skill-item__icon"
            maxHeight="64px"
          ></app-base64-image>
        </div>
        <span class="badge-pf badge-pf--primary">{{ h.nombre }}</span>

        <div class="admin-actions admin-actions--inline" *ngIf="isLogged">
          <button class="btn-pf btn-pf--edit btn-pf--icon-sm" routerLink="/edithabilidad/{{ h.id }}" data-tip="Editar" aria-label="Editar">
            <i class="bi bi-pencil-square"></i>
          </button>
          <button class="btn-pf btn-pf--delete btn-pf--icon-sm" (click)="delete(h.id)" data-tip="Eliminar" aria-label="Eliminar">
            <i class="bi bi-trash"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="grupos.length === 0" class="empty-state">
    No hay habilidades cargadas.
  </div>
</section>
