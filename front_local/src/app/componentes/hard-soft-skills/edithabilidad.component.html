<section class="vh-100 gradient-custom">
    <div class="container py-5 h-100">
        <div class="row d-flex justify-content-center align-items-center h-100">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                <div class="card bg-dark text-white" style="border-radius: 1rem;">
                    <div class="card-body p-5 text-center">

                        <div class="mb-md-5 mt-md-4 pb-5" *ngIf="habilidad">
                            <h2 class="fw-bold mb-2 text-uppercase">EDITAR HABILIDAD</h2>
                            <form (ngSubmit)="onUpdate()" novalidate #f="ngForm">

                                <div class="form-outline form-white mb-4">
                                    <label for="nombre" class="form-label">Nombre</label>
                                    <input class="form-control form-control-lg" type="text" id="nombre" name="nombre"
                                        [(ngModel)]="habilidad.nombre" required>
                                </div>

                                <div class="form-outline form-white mb-4 text-start">
                                    <app-catalog-select
                                        label="Tipo de habilidad"
                                        [options]="tiposHabilidad"
                                        [selectedId]="habilidad.tipoHabilidadId ?? null"
                                        (selectedIdChange)="onTipoChange($event)"
                                        [required]="true"
                                    ></app-catalog-select>
                                </div>

                                <div class="form-outline form-white mb-4 text-start">
                                    <app-image-upload
                                        [(value)]="habilidad.img"
                                        label="Ícono de la habilidad"
                                        [required]="true"
                                    ></app-image-upload>
                                    <small class="text-white-50">PNG o JPEG, máximo 2 MB.</small>
                                </div>

                                <button class="btn btn-outline-light btn-lg px-5"
                                    [disabled]="!f.valid || !habilidad.img || !habilidad.tipoHabilidadId">
                                    Actualizar Habilidad
                                </button>

                                <button class="btn btn-outline-primary btn-lg px-5" style="margin-top: 20px;"
                                    type="button" routerLink="/">
                                    Volver
                                </button>

                            </form>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
