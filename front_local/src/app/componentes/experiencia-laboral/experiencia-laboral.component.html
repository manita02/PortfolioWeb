<div class="row">
    <h1 class="display-4">Experiencia Laboral</h1>

    <div class="col-lg-2">
        <button type="button" class="btn btn-dark agrego" routerLink="/nuevaexp" *ngIf="isLogged">
            <i class="bi bi-plus-circle-fill mas"></i>
        </button>
    </div>
</div>

<div class="row exp-list">
    <div
        class="card text-start col-sm-12 col-md-6 col-lg-4 carta color"
        *ngFor="let exp of expe"
    >
        <div class="card-body color">
            <div class="mb-2" *ngIf="exp.organizacion">
                <app-org-badge [organizacion]="exp.organizacion" size="md"></app-org-badge>
            </div>

            <h4 class="card-title">{{ exp.nombreE }}</h4>

            <app-periodo-display
                [fechaInicio]="exp.fechaInicio"
                [fechaFin]="exp.fechaFin"
                [esActual]="exp.esActual"
            ></app-periodo-display>

            <div class="mt-2 mb-2">
                <span class="badge bg-secondary me-1" *ngIf="exp.tipoEmpleo">{{ exp.tipoEmpleo.nombre }}</span>
                <span class="badge bg-info text-dark" *ngIf="exp.tipoUbicacion">{{ exp.tipoUbicacion.nombre }}</span>
            </div>

            <p class="card-text">{{ exp.descripcionE }}</p>

            <app-skill-chips
                *ngIf="exp.habilidades?.length"
                [habilidades]="exp.habilidades"
                [maxVisible]="4"
            ></app-skill-chips>

            <div class="mt-3" *ngIf="isLogged">
                <button class="btn btn-secondary boton" routerLink="/editexp/{{ exp.id }}">
                    <i class="bi bi-pen-fill"></i>
                </button>
                <button class="btn btn-danger boton" (click)="delete(exp.id)">
                    <i class="bi bi-trash3-fill"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<div *ngIf="expe.length === 0" class="text-muted py-3 px-3">
    No hay experiencias cargadas.
</div>
