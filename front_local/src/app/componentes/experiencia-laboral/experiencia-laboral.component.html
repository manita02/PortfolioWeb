<section class="section section--alt">
  <div class="section__header">
    <h2 class="section__title">Experiencia Laboral</h2>
    <button
      type="button"
      class="btn-pf btn-pf--add"
      routerLink="/nuevaexp"
      *ngIf="isLogged"
      data-tip="Agregar experiencia"
      data-tip-align="end"
      aria-label="Agregar experiencia"
    >
      <i class="bi bi-plus-lg"></i>
    </button>
  </div>

  <div class="exp-carousel" *ngIf="expe.length > 0">
    <div class="exp-carousel__wrapper">
      <button
        type="button"
        class="exp-carousel__nav exp-carousel__nav--prev"
        *ngIf="showNav"
        [disabled]="!canGoPrev"
        (click)="prevPage()"
        aria-label="Experiencia anterior"
      >
        <i class="bi bi-chevron-left" aria-hidden="true"></i>
      </button>

      <div
        #carousel
        class="exp-carousel__viewport"
        [style.height.px]="viewportHeight"
        tabindex="0"
        role="region"
        aria-label="Carrusel de experiencia laboral"
        aria-live="polite"
      >
        <div
          class="exp-carousel__track"
          [style.--total-pages]="totalPages"
          [style.transform]="trackTransform"
        >
          <div
            #carouselPage
            class="exp-carousel__page"
            [class.exp-carousel__page--desktop]="isDesktop"
            *ngFor="let page of pages; let pageIndex = index"
            [attr.aria-hidden]="pageIndex !== currentPage"
          >
            <article
              class="card-portfolio exp-card"
              [ngClass]="getCardCategoryClass(exp)"
              [class.exp-card--current]="exp.esActual"
              *ngFor="let exp of page"
            >
              <div class="card-portfolio__body">
                <div class="exp-card__row exp-card__row--org" *ngIf="exp.organizacion">
                  <app-org-badge [organizacion]="exp.organizacion" size="md"></app-org-badge>
                </div>

                <div class="exp-card__row exp-card__row--employment">
                  <span
                    class="badge-pf badge-pf--employment exp-card__badge exp-card__badge--wide"
                    [ngClass]="getEmploymentBadgeClass(exp)"
                    *ngIf="exp.tipoEmpleo"
                  >
                    <i class="bi" [ngClass]="getEmploymentIcon(exp)" aria-hidden="true"></i>
                    {{ exp.tipoEmpleo.nombre }}
                  </span>
                  <span class="badge-pf badge-pf--actual" *ngIf="exp.esActual">Actual</span>
                </div>

                <h3 class="card-portfolio__title exp-card__row exp-card__row--title">{{ exp.nombreE }}</h3>

                <div class="exp-card__row exp-card__row--meta">
                  <div class="exp-card__meta-item">
                    <app-periodo-display
                      [fechaInicio]="exp.fechaInicio"
                      [fechaFin]="exp.fechaFin"
                      [esActual]="exp.esActual"
                    ></app-periodo-display>
                  </div>
                  <span
                    class="badge-pf badge-pf--secondary badge-pf--location exp-card__badge exp-card__badge--compact"
                    *ngIf="exp.tipoUbicacion"
                  >
                    <i class="bi bi-geo-alt" aria-hidden="true"></i>
                    {{ exp.tipoUbicacion.nombre }}
                  </span>
                </div>

                <p class="card-portfolio__text">{{ exp.descripcionE }}</p>

                <app-skill-chips
                  *ngIf="exp.habilidades?.length"
                  [habilidades]="exp.habilidades"
                  [maxVisible]="4"
                ></app-skill-chips>

                <div class="admin-actions" *ngIf="isLogged">
                  <button
                    class="btn-pf btn-pf--edit btn-pf--icon-sm"
                    routerLink="/editexp/{{ exp.id }}"
                    data-tip="Editar"
                    aria-label="Editar"
                  >
                    <i class="bi bi-pencil-square"></i>
                  </button>
                  <button
                    class="btn-pf btn-pf--delete btn-pf--icon-sm"
                    (click)="delete(exp.id)"
                    data-tip="Eliminar"
                    aria-label="Eliminar"
                  >
                    <i class="bi bi-trash"></i>
                  </button>
                </div>
              </div>
            </article>
          </div>
        </div>
      </div>

      <button
        type="button"
        class="exp-carousel__nav exp-carousel__nav--next"
        *ngIf="showNav"
        [disabled]="!canGoNext"
        (click)="nextPage()"
        aria-label="Experiencia siguiente"
      >
        <i class="bi bi-chevron-right" aria-hidden="true"></i>
      </button>
    </div>

    <div class="exp-carousel__footer" *ngIf="showNav">
      <p class="exp-carousel__counter" aria-live="polite">
        {{ currentPage + 1 }} / {{ totalPages }}
      </p>
      <div class="exp-carousel__dots" role="tablist" aria-label="Páginas del carrusel">
        <button
          type="button"
          class="exp-carousel__dot"
          *ngFor="let page of pages; let i = index"
          [class.exp-carousel__dot--active]="i === currentPage"
          [attr.aria-label]="'Ir a la página ' + (i + 1)"
          [attr.aria-selected]="i === currentPage"
          role="tab"
          (click)="goToPage(i)"
        ></button>
      </div>
    </div>
  </div>

  <div *ngIf="expe.length === 0" class="empty-state">
    No hay experiencias cargadas.
  </div>
</section>
