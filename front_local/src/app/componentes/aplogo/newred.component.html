<section class="vh-100 gradient-custom">
    <div class="container py-5 h-100">
        <div class="row d-flex justify-content-center align-items-center h-100">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                <div class="card bg-dark text-white" style="border-radius: 1rem; ">
                    <div class="card-body p-5 text-center">

                        <div class="container mb-md-5 mt-md-4 pb-5">
                            <div class="row">
                                <div>
                                    <h2 class="fw-bold mb-2 text-uppercase">AGREGAR RED SOCIAL</h2>
                                    <form (ngSubmit)="onCreate()" novalidate #f="ngForm">
                                        <div class="form-group form-outline form-white mb-4">
                                            <label for="nombreRedS" class="form-label">Nombre</label>
                                            <input type="text" class="form-control form-control-lg" id="nombreRedS"
                                                name="nombreRedS" [(ngModel)]="redsocial.nombreRedS" required>
                                        </div>

                                        <div class="form-group form-outline form-white mb-4">
                                            <label for="link" class="form-label">URL de la red social</label>
                                            <input type="url" class="form-control form-control-lg" id="link" name="link"
                                                [(ngModel)]="redsocial.link" required>
                                        </div>

                                        <div class="form-group form-outline form-white mb-4 text-start">
                                            <app-image-upload
                                                [(value)]="redsocial.img"
                                                label="Ícono de la red social"
                                                [required]="true"
                                            ></app-image-upload>
                                            <small class="text-white-50">PNG o JPEG, máximo 2 MB.</small>
                                        </div>

                                        <button class="btn btn-outline-light btn-lg px-5 boton"
                                            [disabled]="!f.valid || !redsocial.img">
                                            Agregar Red Social
                                        </button>

                                        <button class="btn btn-outline-primary btn-lg px-5 boton" type="button" routerLink="/">
                                            Volver
                                        </button>

                                    </form>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
