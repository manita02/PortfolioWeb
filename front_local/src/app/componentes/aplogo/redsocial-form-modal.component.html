<div
  class="pf-modal social-form-modal"
  *ngIf="isOpen"
  role="dialog"
  aria-modal="true"
  [attr.aria-labelledby]="'social-form-modal-title'"
>
  <div class="pf-modal__backdrop" aria-hidden="true" (click)="close()"></div>

  <div class="pf-modal__panel social-form-modal__panel">
    <button
      type="button"
      class="pf-modal__close btn-pf btn-pf--icon-sm"
      (click)="close()"
      [disabled]="guardando || loading"
      data-tip="Cerrar"
      data-tip-pos="left"
      aria-label="Cerrar"
    >
      <i class="bi bi-x-lg" aria-hidden="true"></i>
    </button>

    <div class="pf-modal__header social-form-modal__header">
      <div class="social-form-modal__heading">
        <span class="pf-modal__icon social-form-modal__icon" aria-hidden="true">
          <i class="bi bi-share"></i>
        </span>
        <h2 id="social-form-modal-title" class="pf-modal__title">{{ title }}</h2>
      </div>
    </div>

    <div class="pf-modal__body">
      <div class="pf-modal__loading-overlay" *ngIf="loading">
        <span>
          <i class="bi bi-arrow-repeat social-form-modal__spinner" aria-hidden="true"></i>
          Cargando…
        </span>
      </div>

      <form
        *ngIf="redsocial && !loading"
        #socialForm="ngForm"
        (ngSubmit)="onSubmit(socialForm)"
        class="social-form-modal__form"
        novalidate
      >
        <p class="pf-modal__error" *ngIf="errorMessage" role="alert">
          <i class="bi bi-exclamation-circle" aria-hidden="true"></i>
          {{ errorMessage }}
        </p>

        <div class="social-form-modal__grid">
          <div class="social-form-modal__col social-form-modal__col--fields">
            <div class="form-pf">
              <label class="form-pf__label" for="social-nombre">Nombre</label>
              <input
                type="text"
                id="social-nombre"
                name="nombreRedS"
                class="form-pf__input"
                [(ngModel)]="redsocial.nombreRedS"
                required
                [disabled]="guardando"
              />
            </div>

            <div class="form-pf">
              <label class="form-pf__label" for="social-link">URL de la red social</label>
              <input
                type="url"
                id="social-link"
                name="link"
                class="form-pf__input"
                [(ngModel)]="redsocial.link"
                required
                [disabled]="guardando"
              />
            </div>
          </div>

          <div class="social-form-modal__col social-form-modal__col--icon">
            <app-image-upload
              [(value)]="redsocial.img"
              label="Ícono de la red social"
              [required]="true"
              [iconClearButton]="true"
            ></app-image-upload>
            <p class="pf-modal__hint social-form-modal__hint">
              PNG o JPEG, máximo <strong>2 MB</strong>.
            </p>
          </div>
        </div>

        <div class="pf-modal__actions">
          <button
            type="button"
            class="btn-pf btn-pf--edit"
            (click)="close()"
            [disabled]="guardando"
          >
            Cancelar
          </button>
          <button
            type="submit"
            class="btn-pf btn-pf--view"
            [disabled]="!formValido || guardando"
          >
            <span *ngIf="!guardando">
              <i class="bi bi-check2-lg" aria-hidden="true"></i>
              {{ submitLabel }}
            </span>
            <span *ngIf="guardando" class="social-form-modal__saving">
              <i class="bi bi-arrow-repeat social-form-modal__spinner" aria-hidden="true"></i>
              Guardando…
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
