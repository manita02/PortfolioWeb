<section class="section section--default">
  <div class="section__header">
    <h2 class="section__title">Educación</h2>
    <button
      type="button"
      class="btn-pf btn-pf--add"
      routerLink="/nuevaedu"
      *ngIf="isLogged"
      data-tip="Agregar educación"
      data-tip-align="end"
      aria-label="Agregar educación"
    >
      <i class="bi bi-plus-lg"></i>
    </button>
  </div>

  <div class="edu-filters" *ngIf="showFilters" role="radiogroup" aria-label="Filtrar por tipo de educación">
    <button
      type="button"
      class="edu-filter"
      [class.edu-filter--active]="selectedTipoId === null"
      role="radio"
      [attr.aria-checked]="selectedTipoId === null"
      (click)="selectFilter(null)"
    >
      Todas
    </button>
    <button
      type="button"
      class="edu-filter"
      *ngFor="let tipo of tiposEducacion"
      [class.edu-filter--active]="selectedTipoId === tipo.id"
      role="radio"
      [attr.aria-checked]="selectedTipoId === tipo.id"
      (click)="selectFilter(tipo.id)"
    >
      {{ tipo.nombre }}
    </button>
  </div>

  <div class="edu-carousel" *ngIf="filteredEducacion.length > 0">
    <div class="edu-carousel__wrapper">
      <button
        type="button"
        class="edu-carousel__nav edu-carousel__nav--prev"
        *ngIf="showNav"
        [disabled]="!canGoPrev"
        (click)="prevPage()"
        aria-label="Educación anterior"
      >
        <i class="bi bi-chevron-left" aria-hidden="true"></i>
      </button>

      <div
        #carousel
        class="edu-carousel__viewport"
        [style.height.px]="viewportHeight"
        tabindex="0"
        role="region"
        aria-label="Carrusel de educación"
        aria-live="polite"
      >
        <div
          class="edu-carousel__track"
          [style.--total-pages]="totalPages"
          [style.transform]="trackTransform"
        >
          <div
            #carouselPage
            class="edu-carousel__page"
            [class.edu-carousel__page--desktop]="isDesktop"
            *ngFor="let page of pages; let pageIndex = index"
            [attr.aria-hidden]="pageIndex !== currentPage"
          >
            <article
              class="card-portfolio edu-card"
              [ngClass]="getCardCategoryClass(edu)"
              *ngFor="let edu of page"
            >
              <div class="card-portfolio__body">
                <div class="edu-card__row edu-card__row--org" *ngIf="edu.organizacion">
                  <app-org-badge [organizacion]="edu.organizacion" size="md"></app-org-badge>
                </div>

                <div class="edu-card__row edu-card__row--image" *ngIf="edu.archivoImagen">
                  <img
                    *ngIf="isUrl(edu.archivoImagen)"
                    [src]="edu.archivoImagen"
                    [alt]="edu.nombreE"
                    class="edu-cert-img"
                  />
                  <app-base64-image
                    *ngIf="!isUrl(edu.archivoImagen)"
                    [src]="edu.archivoImagen"
                    [alt]="edu.nombreE"
                    cssClass="edu-cert-img"
                    maxHeight="160px"
                  ></app-base64-image>
                </div>

                <h3 class="card-portfolio__title edu-card__row edu-card__row--title">{{ edu.nombreE }}</h3>

                <div class="edu-card__row edu-card__row--meta">
                  <div class="edu-card__meta-item">
                    <app-periodo-display
                      [fechaInicio]="edu.fechaInicio"
                      [fechaFin]="edu.fechaFin"
                    ></app-periodo-display>
                  </div>
                  <span
                    class="badge-pf badge-pf--secondary edu-card__badge edu-card__badge--compact"
                    *ngIf="edu.tipoEducacion"
                  >
                    <i class="bi" [ngClass]="getEducationIcon(edu)" aria-hidden="true"></i>
                    {{ edu.tipoEducacion.nombre }}
                  </span>
                </div>

                <p class="card-portfolio__text">{{ edu.descripcionE }}</p>

                <app-skill-chips
                  *ngIf="edu.habilidades?.length"
                  [habilidades]="edu.habilidades"
                  [maxVisible]="4"
                ></app-skill-chips>

                <div class="admin-actions" *ngIf="showCardActions(edu)">
                  <a
                    *ngIf="getPdfUri(edu) as pdfUri"
                    [href]="pdfUri"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="btn-pf btn-pf--view btn-pf--icon-sm"
                    download="certificado.pdf"
                    data-tip="Ver certificado"
                    data-tip-pos="right"
                    aria-label="Ver certificado"
                  >
                    <i class="bi bi-file-earmark-pdf"></i>
                  </a>
                  <button
                    *ngIf="isLogged"
                    class="btn-pf btn-pf--edit btn-pf--icon-sm"
                    routerLink="/editedu/{{ edu.id }}"
                    data-tip="Editar"
                    aria-label="Editar"
                  >
                    <i class="bi bi-pencil-square"></i>
                  </button>
                  <button
                    *ngIf="isLogged"
                    class="btn-pf btn-pf--delete btn-pf--icon-sm"
                    (click)="delete(edu.id)"
                    data-tip="Eliminar"
                    aria-label="Eliminar"
                  >
                    <i class="bi bi-trash"></i>
                  </button>
                </div>
              </div>
            </article>
          </div>
        </div>
      </div>

      <button
        type="button"
        class="edu-carousel__nav edu-carousel__nav--next"
        *ngIf="showNav"
        [disabled]="!canGoNext"
        (click)="nextPage()"
        aria-label="Educación siguiente"
      >
        <i class="bi bi-chevron-right" aria-hidden="true"></i>
      </button>
    </div>

    <div class="edu-carousel__footer" *ngIf="showNav">
      <p class="edu-carousel__counter" aria-live="polite">
        {{ currentPage + 1 }} / {{ totalPages }}
      </p>
      <div class="edu-carousel__dots" role="tablist" aria-label="Páginas del carrusel">
        <button
          type="button"
          class="edu-carousel__dot"
          *ngFor="let page of pages; let i = index"
          [class.edu-carousel__dot--active]="i === currentPage"
          [attr.aria-label]="'Ir a la página ' + (i + 1)"
          [attr.aria-selected]="i === currentPage"
          role="tab"
          (click)="goToPage(i)"
        ></button>
      </div>
    </div>
  </div>

  <div *ngIf="educacion.length === 0" class="empty-state">
    No hay educación cargada.
  </div>

  <div *ngIf="educacion.length > 0 && filteredEducacion.length === 0" class="empty-state">
    No hay educación para el filtro seleccionado.
  </div>
</section>
