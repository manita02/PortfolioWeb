<section class="min-vh-100 gradient-custom">
    <div class="container py-5">
        <div class="row d-flex justify-content-center">
            <div class="col-12 col-md-10 col-lg-8 col-xl-7">
                <div class="card bg-dark text-white" style="border-radius: 1rem;">
                    <div class="card-body p-4 p-md-5">

                        <h2 class="fw-bold mb-4 text-uppercase text-center">AGREGAR EDUCACIÓN</h2>
                        <form (ngSubmit)="onCreate()" novalidate #f="ngForm" class="text-start">

                            <div class="mb-3">
                                <label for="nombreE" class="form-label">Título / curso</label>
                                <input class="form-control form-control-lg" type="text" id="nombreE" name="nombreE"
                                    [(ngModel)]="educacion.nombreE" required>
                            </div>

                            <div class="mb-3">
                                <label for="descripcionE" class="form-label">Descripción</label>
                                <textarea class="form-control form-control-lg" id="descripcionE" name="descripcionE"
                                    rows="3" [(ngModel)]="educacion.descripcionE" required></textarea>
                            </div>

                            <app-periodo-input
                                [fechaInicio]="educacion.fechaInicio"
                                [fechaFin]="educacion.fechaFin"
                                [showEsActual]="false"
                                [required]="true"
                                (fechaInicioChange)="educacion.fechaInicio = $event"
                                (fechaFinChange)="educacion.fechaFin = $event"
                            ></app-periodo-input>
                            <small class="text-white-50 d-block mb-3">Formato: MM/yyyy. Fecha fin opcional.</small>

                            <app-catalog-select
                                label="Tipo de educación"
                                [options]="tiposEducacion"
                                [(selectedId)]="educacion.tipoEducacionId"
                                [required]="true"
                            ></app-catalog-select>

                            <app-org-select
                                [organizaciones]="organizaciones"
                                [(selectedId)]="educacion.organizacionId"
                                [required]="true"
                                [allowCreate]="true"
                                (createRequested)="onCreateOrg()"
                            ></app-org-select>

                            <label class="form-label">Habilidades relacionadas</label>
                            <app-skill-multi-select
                                [options]="habilidades"
                                [(selectedIds)]="educacion.habilidadesIds"
                            ></app-skill-multi-select>

                            <div class="mt-3">
                                <app-image-upload
                                    [(value)]="educacion.archivoImagen"
                                    label="Imagen / diploma (opcional)"
                                ></app-image-upload>
                            </div>

                            <app-file-upload
                                mode="pdf"
                                [(value)]="educacion.archivoPdf"
                                label="Certificado PDF (opcional)"
                            ></app-file-upload>

                            <div class="text-center mt-4">
                                <button type="submit" class="btn btn-outline-light btn-lg px-5"
                                    [disabled]="!formValido || guardando">
                                    Agregar Educación
                                </button>
                                <button type="button" class="btn btn-outline-primary btn-lg px-5 d-block mx-auto mt-3"
                                    routerLink="/">
                                    Volver
                                </button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
