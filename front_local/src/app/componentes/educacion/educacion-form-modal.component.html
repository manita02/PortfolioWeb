<div
  class="pf-modal edu-form-modal"
  *ngIf="isOpen"
  role="dialog"
  aria-modal="true"
  [attr.aria-labelledby]="'edu-form-modal-title'"
>
  <div class="pf-modal__backdrop" aria-hidden="true" (click)="close()"></div>

  <div class="pf-modal__panel pf-modal__panel--wide edu-form-modal__panel">
    <button
      type="button"
      class="pf-modal__close btn-pf btn-pf--icon-sm"
      (click)="close()"
      [disabled]="guardando || loading"
      data-tip="Cerrar"
      data-tip-pos="left"
      aria-label="Cerrar"
    >
      <i class="bi bi-x-lg" aria-hidden="true"></i>
    </button>

    <div class="pf-modal__header edu-form-modal__header">
      <div class="edu-form-modal__heading">
        <span class="pf-modal__icon edu-form-modal__icon" aria-hidden="true">
          <i class="bi bi-mortarboard"></i>
        </span>
        <h2 id="edu-form-modal-title" class="pf-modal__title">{{ title }}</h2>
      </div>
    </div>

    <div class="pf-modal__body">
      <div class="pf-modal__loading-overlay" *ngIf="loading">
        <span>
          <i class="bi bi-arrow-repeat edu-form-modal__spinner" aria-hidden="true"></i>
          Cargando…
        </span>
      </div>

      <form
        *ngIf="educacion && !loading"
        #eduForm="ngForm"
        (ngSubmit)="onSubmit(eduForm)"
        class="edu-form-modal__form"
        novalidate
      >
        <p class="pf-modal__error" *ngIf="errorMessage" role="alert">
          <i class="bi bi-exclamation-circle" aria-hidden="true"></i>
          {{ errorMessage }}
        </p>

        <div class="edu-form-modal__grid">
          <div class="edu-form-modal__col edu-form-modal__col--primary">
            <div class="form-pf">
              <label class="form-pf__label" for="edu-nombreE">Título / curso</label>
              <input
                type="text"
                id="edu-nombreE"
                name="nombreE"
                class="form-pf__input"
                [(ngModel)]="educacion.nombreE"
                required
                [disabled]="guardando"
              />
            </div>

            <div class="form-pf">
              <label class="form-pf__label" for="edu-descripcionE">Descripción</label>
              <textarea
                id="edu-descripcionE"
                name="descripcionE"
                class="form-pf__textarea"
                rows="4"
                [(ngModel)]="educacion.descripcionE"
                required
                [disabled]="guardando"
              ></textarea>
            </div>
          </div>

          <div class="edu-form-modal__col edu-form-modal__col--secondary">
            <app-catalog-select
              label="Tipo de educación"
              [options]="tiposEducacion"
              [(selectedId)]="educacion.tipoEducacionId"
              [required]="true"
            ></app-catalog-select>

            <app-periodo-input
              [fechaInicio]="educacion.fechaInicio"
              [fechaFin]="educacion.fechaFin"
              [showEsActual]="false"
              [required]="true"
              [showPreview]="false"
              placeholder="MM/yyyy"
              (fechaInicioChange)="educacion.fechaInicio = $event"
              (fechaFinChange)="educacion.fechaFin = $event"
            ></app-periodo-input>

            <app-org-select
              [organizaciones]="organizaciones"
              [(selectedId)]="educacion.organizacionId"
              [required]="true"
              [allowCreate]="true"
              (createRequested)="onCreateOrg()"
            ></app-org-select>
          </div>

          <div class="edu-form-modal__col edu-form-modal__col--attachments">
            <app-image-upload
              [(value)]="educacion.archivoImagen"
              label="Imagen (opcional)"
              [iconClearButton]="true"
            ></app-image-upload>

            <app-file-upload
              mode="pdf"
              [(value)]="educacion.archivoPdf"
              label="Certificado PDF (opcional)"
            ></app-file-upload>
          </div>

          <div class="edu-form-modal__full">
            <label class="form-pf__label">Habilidades relacionadas</label>
            <app-skill-multi-select
              [options]="habilidades"
              [(selectedIds)]="educacion.habilidadesIds"
            ></app-skill-multi-select>
          </div>
        </div>

        <div class="pf-modal__actions">
          <button
            type="button"
            class="btn-pf btn-pf--edit"
            (click)="close()"
            [disabled]="guardando"
          >
            Cancelar
          </button>
          <button
            type="submit"
            class="btn-pf btn-pf--view"
            [disabled]="!formValido || guardando"
          >
            <span *ngIf="!guardando">
              <i class="bi bi-check2-lg" aria-hidden="true"></i>
              {{ submitLabel }}
            </span>
            <span *ngIf="guardando" class="edu-form-modal__saving">
              <i class="bi bi-arrow-repeat edu-form-modal__spinner" aria-hidden="true"></i>
              Guardando…
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
