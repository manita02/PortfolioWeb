<div
  class="login-modal"
  *ngIf="isOpen"
  role="dialog"
  aria-modal="true"
  aria-labelledby="login-modal-title"
>
  <div class="login-modal__backdrop" aria-hidden="true" (click)="close()"></div>

  <div class="login-modal__panel">
    <button
      type="button"
      class="login-modal__close btn-pf btn-pf--icon-sm"
      (click)="close()"
      [disabled]="isSubmitting"
      data-tip="Cerrar"
      aria-label="Cerrar"
    >
      <i class="bi bi-x-lg" aria-hidden="true"></i>
    </button>

    <div class="login-modal__header">
      <span class="login-modal__icon" aria-hidden="true">
        <i class="bi bi-shield-lock"></i>
      </span>
      <h2 id="login-modal-title" class="login-modal__title">Iniciar sesión</h2>
      <p class="login-modal__subtitle">Ingresá tus credenciales de administrador</p>
    </div>

    <form #loginForm="ngForm" (ngSubmit)="onLogin(loginForm)" class="login-modal__form" novalidate>
      <div class="form-pf" [class.form-pf--error]="loginFailed">
        <label class="form-pf__label" for="login-nombreUsuario">Usuario</label>
        <input
          #usernameInput
          type="text"
          id="login-nombreUsuario"
          name="nombreUsuario"
          class="form-pf__input"
          [(ngModel)]="nombreUsuario"
          autocomplete="username"
          required
          [disabled]="isSubmitting"
        />
      </div>

      <div class="form-pf" [class.form-pf--error]="loginFailed">
        <label class="form-pf__label" for="login-password">Contraseña</label>
        <input
          type="password"
          id="login-password"
          name="password"
          class="form-pf__input"
          [(ngModel)]="password"
          autocomplete="current-password"
          required
          [disabled]="isSubmitting"
        />
      </div>

      <p class="login-modal__error" *ngIf="loginFailed" role="alert">
        <i class="bi bi-exclamation-circle" aria-hidden="true"></i>
        {{ errorMessage }}
      </p>

      <div class="login-modal__actions">
        <button
          type="button"
          class="btn-pf btn-pf--edit login-modal__btn-cancel"
          (click)="close()"
          [disabled]="isSubmitting"
        >
          Cancelar
        </button>
        <button
          type="submit"
          class="btn-pf btn-pf--view login-modal__btn-submit"
          [disabled]="loginForm.invalid || isSubmitting"
        >
          <span *ngIf="!isSubmitting">
            <i class="bi bi-box-arrow-in-right" aria-hidden="true"></i>
            Ingresar
          </span>
          <span *ngIf="isSubmitting" class="login-modal__loading">
            <i class="bi bi-arrow-repeat login-modal__spinner" aria-hidden="true"></i>
            Ingresando…
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
