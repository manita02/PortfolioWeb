<section class="vh-100 gradient-custom">
    <div class="container py-5 h-100">
        <div class="row d-flex justify-content-center align-items-center h-100">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                <div class="card bg-dark text-white" style="border-radius: 1rem; ">
                    <div class="card-body p-5 text-center">

                        <div class="container mb-md-5 mt-md-4 pb-5" *ngIf="banner">
                            <div class="row">
                                <div>
                                    <h2 class="fw-bold mb-2 text-uppercase">EDITAR BANNER</h2>
                                    <form (ngSubmit)="onUpdate()" novalidate #f="ngForm">
                                        <div class="form-group form-outline form-white mb-4">
                                            <label for="titulo" class="form-label">Título</label>
                                            <input type="text" class="form-control form-control-lg" id="titulo"
                                                name="titulo" [(ngModel)]="banner.titulo" required>
                                        </div>

                                        <div class="form-group form-outline form-white mb-4 text-start">
                                            <app-image-upload
                                                [(value)]="banner.img"
                                                label="Imagen del banner"
                                                [required]="true"
                                                [maxSizeKb]="750"
                                            ></app-image-upload>
                                            <small class="text-white-50 d-block mt-1">
                                                JPEG o PNG. Elegí en tu PC un archivo de <strong>hasta 750 KB</strong>
                                                (el peso que muestra el explorador al seleccionar la imagen).
                                                Imágenes más pesadas pueden fallar al guardar en MySQL/XAMPP.
                                            </small>
                                        </div>

                                        <button class="btn btn-outline-light btn-lg px-5" type="submit"
                                            [disabled]="guardando || !f.valid || !banner.img">
                                            {{ guardando ? 'Guardando…' : 'Actualizar Banner' }}
                                        </button>

                                        <button class="btn btn-outline-primary btn-lg px-5" style="margin-top: 20px;"
                                            type="button" routerLink="/">
                                            Volver
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
